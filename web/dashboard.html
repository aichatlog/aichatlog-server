<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIChatLog Server</title>
<style>
:root {
  --bg-void: #08090d;
  --bg-deep: #0f1117;
  --bg-card: #161922;
  --bg-elevated: #1e2130;
  --bg-hover: #252940;
  --border: #2a2e3f;
  --text-primary: #e2e4ed;
  --text-secondary: #8b8fa7;
  --text-tertiary: #565a70;
  --accent: #6c8aff;
  --accent-dim: #3d4f8a;
  --green: #3dd68c;
  --green-dim: rgba(61, 214, 140, 0.12);
  --orange: #ffb340;
  --orange-dim: rgba(255, 179, 64, 0.12);
  --red: #ff6b6b;
  --gray: #565a70;
  --gray-dim: rgba(86, 90, 112, 0.12);
  --radius: 8px;
  --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Menlo', 'Consolas', monospace;
  --sans: -apple-system, 'PingFang SC', sans-serif;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg-void: #f0f1f5; --bg-deep: #f7f8fa; --bg-card: #ffffff;
    --bg-elevated: #f0f1f5; --bg-hover: #e8e9f0; --border: #d8dae3;
    --text-primary: #1a1d2b; --text-secondary: #5c607a; --text-tertiary: #9498b0;
    --accent: #4a66e0; --green: #16a34a; --orange: #d97706; --red: #dc2626;
    --gray: #9498b0;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-void); color: var(--text-primary); min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
header h1 { font-size: 20px; font-weight: 600; }
header .tag { font-size: 11px; background: var(--accent-dim); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-family: var(--mono); }
.header-spacer { flex: 1; }
.lang-switch { display: flex; gap: 2px; }
.lang-btn { background: transparent; border: 1px solid var(--border); color: var(--text-tertiary); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.lang-btn:hover { color: var(--text-secondary); border-color: var(--text-secondary); }
.lang-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
.stat-card:hover, .stat-card.active { border-color: var(--accent); }
.stat-card .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.stat-card .value { font-size: 24px; font-weight: 700; font-family: var(--mono); }
.toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
.search-wrap { flex: 1; position: relative; }
.search-wrap input { width: 100%; padding: 10px 12px 10px 36px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 14px; outline: none; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-tertiary); }
.filter-tabs { display: flex; gap: 4px; }
.filter-tab { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px; transition: all 0.15s; }
.filter-tab:hover { background: var(--bg-hover); }
.filter-tab.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 12px; color: var(--text-tertiary); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: var(--text-secondary); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
tr.data-row:hover td { background: var(--bg-hover); }
tr.data-row { cursor: pointer; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); display: inline-block; }
.badge-received { background: var(--orange-dim); color: var(--orange); }
.badge-synced { background: var(--green-dim); color: var(--green); }
.badge-failed { background: rgba(255,107,107,0.12); color: var(--red); }
.badge-ignored { background: var(--gray-dim); color: var(--gray); }
.source-badge { font-size: 11px; color: var(--accent); background: var(--accent-dim); padding: 1px 6px; border-radius: 3px; display: inline-block; }
.empty { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 12px; max-width: 800px; width: 100%; max-height: calc(100vh - 80px); overflow-y: auto; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 20px; padding: 4px; }
.modal-close:hover { color: var(--text-primary); }
.modal-meta { padding: 16px 24px; display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
.messages-container { padding: 16px 24px; }
.msg { margin-bottom: 16px; }
.msg-role { font-size: 12px; font-weight: 600; margin-bottom: 4px; font-family: var(--mono); }
.msg-role.user { color: var(--accent); }
.msg-role.assistant { color: var(--green); }
.msg-content { font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; background: var(--bg-card); padding: 12px 16px; border-radius: var(--radius); border: 1px solid var(--border); }
.msg-time { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
.pagination button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 14px; border-radius: var(--radius); cursor: pointer; }
.pagination button:hover:not(:disabled) { border-color: var(--accent); }
.pagination button:disabled { opacity: 0.4; cursor: default; }
.page-info { border: none; background: none; color: var(--text-secondary); }
.tab-nav { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.tab-btn { background: transparent; border: none; color: var(--text-secondary); padding: 8px 16px; cursor: pointer; font-size: 14px; border-radius: var(--radius) var(--radius) 0 0; transition: all 0.15s; }
.tab-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.knowledge-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.knowledge-card:hover { border-color: var(--accent); }
.knowledge-type { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); display: inline-block; margin-bottom: 8px; }
.knowledge-type.tech_solution { background: var(--green-dim); color: var(--green); }
.knowledge-type.concept { background: var(--orange-dim); color: var(--orange); }
.knowledge-type.prompt { background: rgba(108,138,255,0.12); color: var(--accent); }
.knowledge-type.work_log { background: var(--gray-dim); color: var(--gray); }
.knowledge-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.knowledge-content { font-size: 13px; color: var(--text-secondary); line-height: 1.5; white-space: pre-wrap; }
.timeline-entry { display: flex; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.timeline-date { font-family: var(--mono); font-size: 12px; color: var(--text-tertiary); white-space: nowrap; min-width: 80px; }
.timeline-body { flex: 1; }
.timeline-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.timeline-desc { font-size: 13px; color: var(--text-secondary); }
.settings-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.settings-section h3 { font-size: 14px; margin-bottom: 12px; color: var(--text-primary); }
.settings-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
.settings-key { color: var(--text-secondary); }
.settings-val { color: var(--text-primary); font-family: var(--mono); }
.action-btn { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.action-btn:hover { border-color: var(--accent); color: var(--accent); }
.action-btn.danger:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>AIChatLog</h1>
    <span class="tag">SERVER</span>
    <div class="header-spacer"></div>
    <div class="lang-switch" id="langSwitch">
      <button type="button" class="lang-btn" onclick="setLang('en')">EN</button>
      <button type="button" class="lang-btn" onclick="setLang('zh-CN')">中文</button>
      <button type="button" class="lang-btn" onclick="setLang('zh-TW')">繁中</button>
    </div>
  </header>

  <nav class="tab-nav">
    <button type="button" class="tab-btn active" onclick="switchTab('conversations')" data-i18n="conversations">Conversations</button>
    <button type="button" class="tab-btn" onclick="switchTab('knowledge')" data-i18n="knowledge">Knowledge</button>
    <button type="button" class="tab-btn" onclick="switchTab('timeline')" data-i18n="timeline">Timeline</button>
    <button type="button" class="tab-btn" onclick="switchTab('settings')" data-i18n="settings">Settings</button>
  </nav>

  <div id="tab-conversations" class="tab-panel active">
  <div class="stats-row" id="statsRow"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5"/></svg>
      <input type="text" id="searchInput" placeholder="Search conversations..." data-i18n-placeholder="search" oninput="onSearch()">
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="" onclick="setFilter(this, '')" data-i18n="all">All</button>
      <button class="filter-tab" data-filter="received" onclick="setFilter(this, 'received')" data-i18n="received">Received</button>
      <button class="filter-tab" data-filter="synced" onclick="setFilter(this, 'synced')" data-i18n="synced">Synced</button>
      <button class="filter-tab" data-filter="ignored" onclick="setFilter(this, 'ignored')" data-i18n="ignored">Ignored</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="setSort('started_at')" data-i18n="date">Date</th>
        <th onclick="setSort('title')" data-i18n="title">Title</th>
        <th onclick="setSort('project')" data-i18n="project">Project</th>
        <th data-i18n="source">Source</th>
        <th data-i18n="model">Model</th>
        <th onclick="setSort('message_count')" data-i18n="msgs">Msgs</th>
        <th onclick="setSort('word_count')" data-i18n="words">Words</th>
        <th data-i18n="tokens">Tokens</th>
        <th data-i18n="status">Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="pagination" id="pagination"></div>
  </div><!-- /tab-conversations -->

  <div id="tab-knowledge" class="tab-panel">
    <div class="toolbar">
      <div class="filter-tabs">
        <button type="button" class="filter-tab active" data-ktype="" onclick="setKnowledgeType(this,'')" data-i18n="all">All</button>
        <button type="button" class="filter-tab" data-ktype="tech_solution" onclick="setKnowledgeType(this,'tech_solution')" data-i18n="tech_solutions">Tech Solutions</button>
        <button type="button" class="filter-tab" data-ktype="concept" onclick="setKnowledgeType(this,'concept')" data-i18n="concepts">Concepts</button>
        <button type="button" class="filter-tab" data-ktype="prompt" onclick="setKnowledgeType(this,'prompt')" data-i18n="prompts">Prompts</button>
        <button type="button" class="filter-tab" data-ktype="work_log" onclick="setKnowledgeType(this,'work_log')" data-i18n="work_log">Work Log</button>
      </div>
    </div>
    <div id="knowledgeList"></div>
  </div>

  <div id="tab-timeline" class="tab-panel">
    <div id="timelineList"></div>
  </div>

  <div id="tab-settings" class="tab-panel">
    <div id="settingsContent"></div>
  </div>
</div><!-- /container -->

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="messages-container" id="modalMessages"></div>
  </div>
</div>

<script>
// ── i18n ──
const STRINGS = {
  en: {
    conversations: 'Conversations', knowledge: 'Knowledge', timeline: 'Timeline', settings: 'Settings',
    search: 'Search conversations...', all: 'All', received: 'Received', synced: 'Synced', ignored: 'Ignored',
    date: 'Date', title: 'Title', project: 'Project', source: 'Source', model: 'Model',
    msgs: 'Msgs', words: 'Words', tokens: 'Tokens', status: 'Status',
    total: 'Total', prev: 'Prev', next: 'Next', page: 'Page',
    no_conversations: t('no_conversations'),
    tech_solutions: 'Tech Solutions', concepts: 'Concepts', prompts: 'Prompts', work_log: 'Work Log',
    no_extractions: 'No extractions yet. Configure LLM in settings to enable knowledge extraction.',
    no_work_log: 'No work log entries. LLM extraction creates these automatically.',
    delete: 'Delete', reprocess: 'Reprocess', extract: 'Extract Knowledge',
    confirm_delete: 'Delete this conversation?',
    extracting: 'Extracting...', extracted: 'Extracted!', failed: 'Failed',
    overview: 'Overview', output_adapter: 'Output Adapter', llm_extraction: 'LLM Extraction',
    processor: 'Processor', adapter: 'Adapter', path: 'Path', enabled: 'Enabled',
    interval: 'Interval', batch_size: 'Batch size', sync_dir: 'Sync directory',
    min_words: 'Min words', conversations_count: 'Conversations', projects: 'Projects',
    extractions: 'Extractions', total_words: 'Total words',
    total_tokens_in: 'Total tokens (in)', total_tokens_out: 'Total tokens (out)',
    tokens_in_out: 'Tokens: %d in / %d out', msgs_words: '%d msgs / %d words',
  },
  'zh-CN': {
    conversations: '对话', knowledge: '知识库', timeline: '时间线', settings: '设置',
    search: '搜索对话...', all: '全部', received: '已接收', synced: '已同步', ignored: '已忽略',
    date: '日期', title: '标题', project: '项目', source: '来源', model: '模型',
    msgs: '消息', words: '字数', tokens: 'Token', status: '状态',
    total: '总计', prev: '上一页', next: '下一页', page: '第',
    no_conversations: '没有找到对话',
    tech_solutions: '技术方案', concepts: '概念', prompts: '提示词', work_log: '工作日志',
    no_extractions: '暂无知识提取。请在设置中配置 LLM 以启用。',
    no_work_log: '暂无工作日志。LLM 提取会自动生成。',
    delete: '删除', reprocess: '重新处理', extract: '提取知识',
    confirm_delete: '确定要删除这条对话吗？',
    extracting: '提取中...', extracted: '提取完成！', failed: '失败',
    overview: '概览', output_adapter: '输出适配器', llm_extraction: 'LLM 提取',
    processor: '处理器', adapter: '适配器', path: '路径', enabled: '启用',
    interval: '间隔', batch_size: '批量大小', sync_dir: '同步目录',
    min_words: '最少字数', conversations_count: '对话数', projects: '项目数',
    extractions: '提取数', total_words: '总字数',
    total_tokens_in: '总输入 Token', total_tokens_out: '总输出 Token',
    tokens_in_out: 'Token: %d 输入 / %d 输出', msgs_words: '%d 条消息 / %d 字',
  },
  'zh-TW': {
    conversations: '對話', knowledge: '知識庫', timeline: '時間線', settings: '設定',
    search: '搜尋對話...', all: '全部', received: '已接收', synced: '已同步', ignored: '已忽略',
    date: '日期', title: '標題', project: '專案', source: '來源', model: '模型',
    msgs: '訊息', words: '字數', tokens: 'Token', status: '狀態',
    total: '總計', prev: '上一頁', next: '下一頁', page: '第',
    no_conversations: '沒有找到對話',
    tech_solutions: '技術方案', concepts: '概念', prompts: '提示詞', work_log: '工作日誌',
    no_extractions: '暫無知識擷取。請在設定中配置 LLM 以啟用。',
    no_work_log: '暫無工作日誌。LLM 擷取會自動生成。',
    delete: '刪除', reprocess: '重新處理', extract: '擷取知識',
    confirm_delete: '確定要刪除這條對話嗎？',
    extracting: '擷取中...', extracted: '擷取完成！', failed: '失敗',
    overview: '概覽', output_adapter: '輸出適配器', llm_extraction: 'LLM 擷取',
    processor: '處理器', adapter: '適配器', path: '路徑', enabled: '啟用',
    interval: '間隔', batch_size: '批次大小', sync_dir: '同步目錄',
    min_words: '最少字數', conversations_count: '對話數', projects: '專案數',
    extractions: '擷取數', total_words: '總字數',
    total_tokens_in: '總輸入 Token', total_tokens_out: '總輸出 Token',
    tokens_in_out: 'Token: %d 輸入 / %d 輸出', msgs_words: '%d 則訊息 / %d 字',
  },
};
let currentLang = 'en';
function t(key) { return (STRINGS[currentLang] || STRINGS.en)[key] || STRINGS.en[key] || key; }
function tf(key, ...args) { let s = t(key); args.forEach(a => s = s.replace('%d', a)); return s; }

async function setLang(lang) {
  currentLang = lang;
  // Save to server config
  try {
    const cfg = await api('/config');
    cfg.lang = lang;
    await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cfg) });
  } catch(e) {}
  // Update UI
  applyI18n();
  updateLangButtons();
  loadStats();
  loadConversations();
}

function updateLangButtons() {
  document.querySelectorAll('.lang-btn').forEach(b => {
    const btnLang = b.textContent === 'EN' ? 'en' : b.textContent === '中文' ? 'zh-CN' : 'zh-TW';
    b.classList.toggle('active', btnLang === currentLang);
  });
}

// Apply i18n to static HTML elements with data-i18n attribute
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
}

const PAGE_SIZE = 50;
let state = { filter: '', query: '', sort: 'started_at', order: 'desc', offset: 0 };
let searchTimer = null;

async function api(path) {
  const r = await fetch('/api' + path);
  return r.json();
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.textContent;
}

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  if (typeof children === 'string') e.textContent = children;
  else if (Array.isArray(children)) children.forEach(c => { if (c) e.appendChild(c); });
  return e;
}

async function loadStats() {
  const s = await api('/stats');
  const container = document.getElementById('statsRow');
  container.replaceChildren();
  [
    { k: '', label: t('total'), v: s.total },
    { k: 'received', label: t('received'), v: s.received },
    { k: 'synced', label: t('synced'), v: s.synced },
    { k: 'ignored', label: t('ignored'), v: s.ignored },
  ].forEach(x => {
    const card = el('div', { class: 'stat-card' + (state.filter === x.k ? ' active' : ''), 'data-filter': x.k }, [
      el('div', { class: 'label' }, x.label),
      el('div', { class: 'value' }, String(x.v)),
    ]);
    card.addEventListener('click', () => setFilter(null, x.k));
    container.appendChild(card);
  });
}

async function loadConversations() {
  const params = new URLSearchParams();
  if (state.filter) params.set('status', state.filter);
  if (state.query) params.set('q', state.query);
  params.set('sort', state.sort);
  params.set('order', state.order);
  params.set('limit', PAGE_SIZE);
  params.set('offset', state.offset);

  const rows = await api('/conversations?' + params);
  const tbody = document.getElementById('tbody');
  tbody.replaceChildren();

  if (!rows.length) {
    const tr = el('tr', {}, [el('td', { colspan: '9', class: 'empty' }, t('no_conversations'))]);
    tbody.appendChild(tr);
    document.getElementById('pagination').replaceChildren();
    return;
  }

  rows.forEach(c => {
    const modelShort = (c.model || '').replace('claude-', '').replace('-20250514', '').replace('-20251001', '');
    const tokensStr = (c.total_input_tokens || c.total_output_tokens)
      ? ((c.total_input_tokens/1000).toFixed(1) + 'k/' + (c.total_output_tokens/1000).toFixed(1) + 'k')
      : '\u2014';
    const tr = el('tr', { class: 'data-row' }, [
      el('td', { style: 'white-space:nowrap;font-family:var(--mono);font-size:13px;color:var(--text-secondary)' }, (c.started_at || '').slice(0, 10)),
      (() => {
        const td = el('td', {}, c.title);
        if (c.has_code) {
          const code = el('span', { style: 'color:var(--accent);font-size:11px;margin-left:4px' }, '</>' );
          td.appendChild(code);
        }
        return td;
      })(),
      el('td', { style: 'color:var(--text-secondary)' }, c.project || '\u2014'),
      (() => {
        const td = document.createElement('td');
        td.appendChild(el('span', { class: 'source-badge' }, c.source_type));
        return td;
      })(),
      el('td', { style: 'font-family:var(--mono);font-size:11px;color:var(--text-secondary)' }, modelShort || '\u2014'),
      el('td', { style: 'font-family:var(--mono);font-size:13px;text-align:center' }, String(c.message_count)),
      el('td', { style: 'font-family:var(--mono);font-size:13px;text-align:center' }, String(c.word_count)),
      el('td', { style: 'font-family:var(--mono);font-size:11px;text-align:center;color:var(--text-secondary)' }, tokensStr),
      (() => {
        const td = document.createElement('td');
        td.appendChild(el('span', { class: 'badge badge-' + c.status }, c.status));
        return td;
      })(),
    ]);
    tr.addEventListener('click', () => showDetail(c.id));
    tbody.appendChild(tr);
  });

  // Pagination
  const pag = document.getElementById('pagination');
  pag.replaceChildren();
  const page = Math.floor(state.offset / PAGE_SIZE);
  const hasNext = rows.length === PAGE_SIZE;
  const prevBtn = el('button', {}, t('prev'));
  prevBtn.disabled = page === 0;
  prevBtn.addEventListener('click', () => goPage(page - 1));
  const info = el('button', { class: 'page-info' }, t('page') + ' ' + (page + 1));
  info.disabled = true;
  const nextBtn = el('button', {}, t('next'));
  nextBtn.disabled = !hasNext;
  nextBtn.addEventListener('click', () => goPage(page + 1));
  pag.append(prevBtn, info, nextBtn);
}

function setFilter(btn, f) {
  state.filter = f;
  state.offset = 0;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  loadStats();
  loadConversations();
}

function setSort(col) {
  if (state.sort === col) state.order = state.order === 'desc' ? 'asc' : 'desc';
  else { state.sort = col; state.order = 'desc'; }
  state.offset = 0;
  loadConversations();
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.query = document.getElementById('searchInput').value.trim();
    state.offset = 0;
    loadConversations();
  }, 300);
}

function goPage(p) { state.offset = p * PAGE_SIZE; loadConversations(); }

async function showDetail(id) {
  const c = await api('/conversations/' + encodeURIComponent(id) + '?full=true');

  document.getElementById('modalTitle').textContent = c.title;

  const meta = document.getElementById('modalMeta');
  meta.replaceChildren();
  // Time range
  const startDate = (c.started_at || '').replace('T', ' ').slice(0, 19);
  const endDate = (c.ended_at || '').replace('T', ' ').slice(0, 19);
  const timeStr = endDate ? (startDate + ' → ' + endDate.slice(11)) : startDate;
  meta.appendChild(el('span', {}, timeStr));

  const srcSpan = document.createElement('span');
  srcSpan.appendChild(el('span', { class: 'source-badge' }, c.source_type));
  meta.appendChild(srcSpan);
  if (c.project) meta.appendChild(el('span', {}, 'Project: ' + c.project));
  if (c.model) meta.appendChild(el('span', {}, 'Model: ' + c.model));
  meta.appendChild(el('span', {}, tf('msgs_words', c.message_count, c.word_count)));
  if (c.total_input_tokens || c.total_output_tokens) {
    meta.appendChild(el('span', {}, tf('tokens_in_out', c.total_input_tokens, c.total_output_tokens)));
  }
  const statusSpan = document.createElement('span');
  statusSpan.appendChild(el('span', { class: 'badge badge-' + c.status }, c.status));
  meta.appendChild(statusSpan);
  // Source-specific metadata
  if (c.metadata && c.metadata !== '{}') {
    try {
      const md = typeof c.metadata === 'string' ? JSON.parse(c.metadata) : c.metadata;
      Object.entries(md).forEach(([k, v]) => {
        meta.appendChild(el('span', { style: 'font-size:11px;color:var(--text-tertiary)' }, k + ': ' + v));
      });
    } catch(e) {}
  }

  const container = document.getElementById('modalMessages');
  container.replaceChildren();
  (c.messages || []).filter(m => !m.is_context).forEach(m => {
    const msgDiv = el('div', { class: 'msg' }, [
      el('div', { class: 'msg-role ' + m.role }, m.role),
      el('div', { class: 'msg-content' }, m.content),
      m.timestamp ? el('div', { class: 'msg-time' }, m.timestamp) : null,
    ]);
    container.appendChild(msgDiv);
  });

  // Action buttons in modal
  const actions = document.createElement('div');
  actions.style.cssText = 'padding:12px 24px;border-top:1px solid var(--border);display:flex;gap:8px';
  const delBtn = el('button', { class: 'action-btn danger', onclick: async () => {
    if (!confirm(t('confirm_delete'))) return;
    await fetch('/api/conversations/' + encodeURIComponent(c.id), { method: 'DELETE' });
    closeModal(); loadStats(); loadConversations();
  }}, t('delete'));
  const reprocessBtn = el('button', { class: 'action-btn', onclick: async () => {
    await fetch('/api/conversations/' + encodeURIComponent(c.id) + '/reprocess', { method: 'POST' });
    closeModal(); loadStats(); loadConversations();
  }}, t('reprocess'));
  const extractBtn = el('button', { class: 'action-btn', onclick: async () => {
    extractBtn.textContent = t('extracting');
    const r = await fetch('/api/conversations/' + encodeURIComponent(c.id) + '/extract', { method: 'POST' });
    const res = await r.json();
    extractBtn.textContent = res.ok ? t('extracted') : t('failed');
  }}, t('extract'));
  actions.append(delBtn, reprocessBtn, extractBtn);
  container.after(actions);

  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Tab Switching ──
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().startsWith(name.slice(0,4))));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  if (name === 'knowledge') loadKnowledge();
  if (name === 'timeline') loadTimeline();
  if (name === 'settings') loadSettings();
}

// ── Knowledge Tab ──
let knowledgeType = '';
function setKnowledgeType(btn, type) {
  knowledgeType = type;
  document.querySelectorAll('#tab-knowledge .filter-tab').forEach(b => b.classList.toggle('active', (b.dataset.ktype || '') === type));
  loadKnowledge();
}

async function loadKnowledge() {
  const params = new URLSearchParams({ limit: '100' });
  if (knowledgeType) params.set('type', knowledgeType);
  const exts = await api('/extractions?' + params);
  const container = document.getElementById('knowledgeList');
  container.replaceChildren();
  if (!exts.length) {
    container.appendChild(el('div', { class: 'empty' }, t('no_extractions')));
    return;
  }
  exts.forEach(e => {
    const card = el('div', { class: 'knowledge-card' }, [
      el('span', { class: 'knowledge-type ' + e.type }, e.type.replace('_', ' ')),
      el('div', { class: 'knowledge-title' }, e.title),
      el('div', { class: 'knowledge-content' }, e.content.slice(0, 500) + (e.content.length > 500 ? '...' : '')),
      el('div', { style: 'margin-top:8px;font-size:11px;color:var(--text-tertiary)' },
        (e.extracted_at || '').slice(0, 10) + (e.model_used ? ' / ' + e.model_used : '')),
    ]);
    container.appendChild(card);
  });
}

// ── Timeline Tab ──
async function loadTimeline() {
  const exts = await api('/extractions?type=work_log&limit=50');
  const container = document.getElementById('timelineList');
  container.replaceChildren();
  if (!exts.length) {
    container.appendChild(el('div', { class: 'empty' }, t('no_work_log')));
    return;
  }
  exts.forEach(e => {
    const entry = el('div', { class: 'timeline-entry' }, [
      el('div', { class: 'timeline-date' }, (e.extracted_at || '').slice(0, 10)),
      el('div', { class: 'timeline-body' }, [
        el('div', { class: 'timeline-title' }, e.title),
        el('div', { class: 'timeline-desc' }, e.content),
      ]),
    ]);
    container.appendChild(entry);
  });
}

// ── Settings Tab ──
async function loadSettings() {
  const cfg = await api('/config');
  const summary = await api('/stats/summary');
  const container = document.getElementById('settingsContent');
  container.replaceChildren();

  // Stats summary
  const statsSection = el('div', { class: 'settings-section' }, [el('h3', {}, t('overview'))]);
  [
    [t('conversations_count'), summary.total],
    [t('projects'), summary.project_count],
    [t('extractions'), summary.extraction_count],
    [t('total_words'), summary.total_words?.toLocaleString()],
    [t('total_tokens_in'), summary.total_input_tokens?.toLocaleString()],
    [t('total_tokens_out'), summary.total_output_tokens?.toLocaleString()],
  ].forEach(([k, v]) => {
    statsSection.appendChild(el('div', { class: 'settings-row' }, [
      el('span', { class: 'settings-key' }, k),
      el('span', { class: 'settings-val' }, String(v || 0)),
    ]));
  });
  container.appendChild(statsSection);

  // Output adapter config
  const outputSection = el('div', { class: 'settings-section' }, [el('h3', {}, t('output_adapter'))]);
  [
    [t('adapter'), cfg.output?.adapter || 'none'],
  ].forEach(([k, v]) => {
    outputSection.appendChild(el('div', { class: 'settings-row' }, [
      el('span', { class: 'settings-key' }, k),
      el('span', { class: 'settings-val' }, v),
    ]));
  });
  if (cfg.output?.local) outputSection.appendChild(el('div', { class: 'settings-row' }, [el('span', { class: 'settings-key' }, t('path')), el('span', { class: 'settings-val' }, cfg.output.local.path)]));
  if (cfg.output?.fns) outputSection.appendChild(el('div', { class: 'settings-row' }, [el('span', { class: 'settings-key' }, 'FNS URL'), el('span', { class: 'settings-val' }, cfg.output.fns.url)]));
  if (cfg.output?.git) outputSection.appendChild(el('div', { class: 'settings-row' }, [el('span', { class: 'settings-key' }, 'Git repo'), el('span', { class: 'settings-val' }, cfg.output.git.repo_path)]));
  container.appendChild(outputSection);

  const llmSection = el('div', { class: 'settings-section' }, [el('h3', {}, t('llm_extraction'))]);
  [
    [t('adapter'), cfg.llm?.adapter || 'none'],
    [t('min_words'), cfg.llm?.min_words || 100],
  ].forEach(([k, v]) => {
    llmSection.appendChild(el('div', { class: 'settings-row' }, [
      el('span', { class: 'settings-key' }, k),
      el('span', { class: 'settings-val' }, String(v)),
    ]));
  });
  container.appendChild(llmSection);

  // Processor config
  const procSection = el('div', { class: 'settings-section' }, [el('h3', {}, t('processor'))]);
  [
    [t('enabled'), cfg.processor?.enabled ?? true],
    [t('interval'), (cfg.processor?.interval_seconds || 30) + 's'],
    [t('batch_size'), cfg.processor?.batch_size || 20],
    [t('sync_dir'), cfg.processor?.sync_dir || 'aichatlog'],
  ].forEach(([k, v]) => {
    procSection.appendChild(el('div', { class: 'settings-row' }, [
      el('span', { class: 'settings-key' }, k),
      el('span', { class: 'settings-val' }, String(v)),
    ]));
  });
  container.appendChild(procSection);
}

// Init: load lang from config, then render
(async () => {
  try {
    const cfg = await api('/config');
    if (cfg.lang && STRINGS[cfg.lang]) currentLang = cfg.lang;
  } catch(e) {}
  applyI18n();
  updateLangButtons();
  loadStats();
  loadConversations();
})();
</script>
